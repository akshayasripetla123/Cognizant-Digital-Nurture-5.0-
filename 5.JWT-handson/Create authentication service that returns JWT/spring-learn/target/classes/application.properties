# Application configuration
spring.application.name=spring-learn

# Server port set to 8090 as required by the authentication/JWT service task
server.port=8090

# Show a bit more detail in logs at startup
logging.level.com.cognizant.springlearn=DEBUG

# JWT signing secret (Base64, HS256 needs >= 256 bits / 32 bytes) - for learning purposes only,
# in a real project this belongs in an environment variable or a secrets manager, never in source control.
jwt.secret=YmFja2VuZC1zZWNyZXQta2V5LWZvci1zcHJpbmctbGVhcm4tand0LWRlbW8tMTIzNDU2Nzg=

# Token validity in milliseconds (20 minutes)
jwt.expiration.ms=1200000
